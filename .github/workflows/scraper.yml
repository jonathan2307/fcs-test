name: Ligaportal Scraper

on:
  schedule:
    # Täglich um 23:00 Uhr Wien (= 22:00 UTC im Sommer / 21:00 UTC im Winter)
    - cron: '0 22 * * *'
  workflow_dispatch:  # Manuell auslösbar

permissions:
  contents: write  # Nötig für git push

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        run: npx tsx scripts/scraper/index.ts

      - name: Commit and push updated JSON data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/spielplan-km.json src/data/tabelle-km.json \
                  src/data/spielplan-1b.json src/data/tabelle-1b.json
          if git diff --staged --quiet; then
            echo "No data changes – nothing to commit."
          else
            git commit -m "chore: update spielplan + tabelle data [skip ci]"
            git push
          fi
